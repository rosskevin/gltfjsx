name: Release

on: [push]

permissions:
  # auto pushes version-bump commits/tags and creates GitHub releases via the built-in token
  contents: write
  # auto's released / first-time-contributor / canary plugins comment on merged PRs and issues
  pull-requests: write
  issues: write
  # OIDC token for npm trusted publishing (token-less publish + provenance) — configured at npmjs.com
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    env:
      # built-in token (no PAT to rotate); the permissions block above grants what auto needs
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare repository
        run: git fetch --unshallow --tags

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Pin 24.18.0+: Node 24.17.0 carries an http.Agent regression that makes node-fetch@2 (auto's pinned
          # octokit) throw false ERR_STREAM_PREMATURE_CLOSE on keep-alive socket reuse — nodejs/node#63989, fixed in 24.18.0.
          node-version: 24.18.0
          cache: "pnpm"

      # allow the lock file to change
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm test
      - run: pnpm build

      # commit back the lock file change if it works
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Apply pnpm-lock.yaml changes

      - run: pnpm release
